---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    redis_host: "{{ lookup('env', 'REDIS_HOST') | default('127.0.0.1', true) }}"
  tasks:
    - name: Dump Redis
      shell: |
        exec 3<>/dev/tcp/{{ redis_host }}/6379
        echo -e "KEYS *\r" >&3
        read -r hdr <&3; n=${hdr//[^0-9]/}
        KEYS=()
        while ((n--)); do
          read -r _ <&3; read -r k <&3; KEYS+=("${k%?}")
        done
        for k in "${KEYS[@]}"; do
          echo -e "GET $k\r" >&3
          read -r meta <&3; len=${meta//[^0-9-]/}
          if [[ $len == "-1" ]]; then echo "$k: (nil)"; continue; fi
          read -r v <&3; echo "$k: ${v%?}"
        done
        echo -e "QUIT\r" >&3
        exec 3>&-
      register: dump

    - debug: var=dump.stdout_lines
