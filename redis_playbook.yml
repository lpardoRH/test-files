---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    redis_host: "{{ lookup('env', 'REDIS_HOST') | default('127.0.0.1', true) }}"
  tasks:
    - name: Dump Redis
      shell: |
        python3 -c "
        import socket, base64
        s = socket.socket()
        s.connect(('{{ redis_host }}', 6379))
        s.sendall(b'KEYS *\r\n')
        data = b''
        while b'\r\n' not in data or data.count(b'\r\n') < int(data.split(b'\r\n')[0][1:]) * 2 + 1:
            data += s.recv(4096)
        lines = data.decode(errors='replace').strip().split('\r\n')
        keys = [lines[i] for i in range(2, len(lines), 2)]
        for k in keys:
            s.sendall(f'GET {k}\r\n'.encode())
            resp = b''
            while b'\r\n' not in resp:
                resp += s.recv(4096)
            length = int(resp.split(b'\r\n')[0][1:])
            if length == -1:
                print(f'{k}: (nil)')
                continue
            val = resp.split(b'\r\n', 1)[1]
            while len(val) < length + 2:
                val += s.recv(4096)
            val = val[:length]
            print(f'{k}: {base64.b64encode(val).decode()}')
        s.sendall(b'QUIT\r\n')
        s.close()
        "
      register: dump

    - debug: var=dump.stdout_lines
