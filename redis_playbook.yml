---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    redis_host: "{{ lookup('env', 'REDIS_HOST') | default('127.0.0.1', true) }}"
  tasks:
    - name: Dump Redis
      shell: |
        exec 3<>/dev/tcp/{{ redis_host }}/6379
        echo -e "KEYS *\r" >&3
        sleep 1
        KEYS=$(timeout 1 cat <&3 | tr -d '\r' | grep -v '^\*\|^\$' | grep .)
        exec 3>&-
        for k in $KEYS; do
          VAL=$(echo -e "GET $k\r\nQUIT\r" | timeout 3 bash -c "exec 3<>/dev/tcp/{{ redis_host }}/6379; cat >&3; timeout 1 cat <&3" | tr -d '\r' | grep -v '^\$\|^+OK\|^\*' | grep .)
          echo "$k: $VAL"
        done
      register: dump

    - debug: var=dump.stdout_lines
