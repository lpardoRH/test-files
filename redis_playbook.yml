---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    redis_host: "{{ lookup('env', 'REDIS_HOST') | default('127.0.0.1', true) }}"
  tasks:
    - name: Dump Redis
      shell: |
        exec 3<>/dev/tcp/{{ redis_host }}/6379
        echo -e "KEYS *\r" >&3
        read <&3; n=${REPLY%%[^0-9]*}
        while ((n--)); do read <&3; read <&3; KEYS+="${REPLY%?} "; done
        for k in $KEYS; do
          echo -e "GET $k\r" >&3
          read <&3; read <&3; echo "$k: ${REPLY%?}"
        done
        echo -e "QUIT\r" >&3
        exec 3>&-
      register: dump

    - debug: var=dump.stdout_lines
